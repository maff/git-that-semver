name: Test and Build

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  git-that-semver:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      GTS_DOCKER_VERSION: ${{ steps.git-that-semver.outputs.GTS_DOCKER_VERSION }}
      GTS_DOCKER_TAGS: ${{ steps.git-that-semver.outputs.GTS_DOCKER_TAGS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - id: git-that-semver
        name: git-that-semver
        run: bun run index.ts -e docker | tee -a "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun lint

      - name: Unit tests
        run: bun run test:unit

      - name: E2E tests
        run: bun run test:e2e

  test-action:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build Docker image
        run: docker build -t git-that-semver-test .

      - name: Test action entrypoint - env output
        run: |
          OUTPUT_FILE=$(mktemp)
          SUMMARY_FILE=$(mktemp)

          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            -e CI=true \
            -e INPUT_ENV=true \
            -e INPUT_JSON=false \
            -e INPUT_YAML=false \
            -e INPUT_ARGS="" \
            -e GITHUB_ACTIONS=true \
            -e GITHUB_EVENT_NAME=push \
            -e GITHUB_REF_TYPE=branch \
            -e GITHUB_REF_NAME=main \
            -e GITHUB_SHA=$(git rev-parse HEAD) \
            -e GITHUB_OUTPUT=/workspace/.gts-output \
            -e GITHUB_STEP_SUMMARY=/workspace/.gts-summary \
            --entrypoint /entrypoint-action.sh \
            git-that-semver-test

          echo "--- Validating env output ---"
          grep -q "GTS_IS_SNAPSHOT_VERSION=" .gts-output
          grep -q "GTS_IS_TAGGED_VERSION=" .gts-output
          grep -q "GTS_DOCKER_VERSION=" .gts-output
          echo "env output OK"

          echo "--- Validating step summary ---"
          grep -q '```env' .gts-summary
          echo "step summary OK"

          rm -f .gts-output .gts-summary

      - name: Test action entrypoint - env output with args
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            -e CI=true \
            -e INPUT_ENV=true \
            -e INPUT_JSON=false \
            -e INPUT_YAML=false \
            -e INPUT_ARGS="-e npm" \
            -e GITHUB_ACTIONS=true \
            -e GITHUB_EVENT_NAME=push \
            -e GITHUB_REF_TYPE=branch \
            -e GITHUB_REF_NAME=main \
            -e GITHUB_SHA=$(git rev-parse HEAD) \
            -e GITHUB_OUTPUT=/workspace/.gts-output \
            -e GITHUB_STEP_SUMMARY=/workspace/.gts-summary \
            --entrypoint /entrypoint-action.sh \
            git-that-semver-test

          echo "--- Validating args are forwarded ---"
          grep -q "GTS_DOCKER_VERSION=" .gts-output
          grep -q "GTS_NPM_VERSION=" .gts-output
          echo "args forwarding OK"

          rm -f .gts-output .gts-summary

      - name: Test action entrypoint - JSON output
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            -e CI=true \
            -e INPUT_ENV=false \
            -e INPUT_JSON=true \
            -e INPUT_YAML=false \
            -e INPUT_ARGS="" \
            -e GITHUB_ACTIONS=true \
            -e GITHUB_EVENT_NAME=push \
            -e GITHUB_REF_TYPE=branch \
            -e GITHUB_REF_NAME=main \
            -e GITHUB_SHA=$(git rev-parse HEAD) \
            -e GITHUB_OUTPUT=/workspace/.gts-output \
            -e GITHUB_STEP_SUMMARY=/workspace/.gts-summary \
            --entrypoint /entrypoint-action.sh \
            git-that-semver-test

          echo "--- Validating JSON output ---"
          sed -n '/^GTS_JSON<<EOF$/,/^EOF$/p' .gts-output | sed '1d;$d' | python3 -m json.tool > /dev/null
          echo "JSON output OK"

          rm -f .gts-output .gts-summary

      - name: Test action entrypoint - YAML output
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            -e CI=true \
            -e INPUT_ENV=false \
            -e INPUT_JSON=false \
            -e INPUT_YAML=true \
            -e INPUT_ARGS="" \
            -e GITHUB_ACTIONS=true \
            -e GITHUB_EVENT_NAME=push \
            -e GITHUB_REF_TYPE=branch \
            -e GITHUB_REF_NAME=main \
            -e GITHUB_SHA=$(git rev-parse HEAD) \
            -e GITHUB_OUTPUT=/workspace/.gts-output \
            -e GITHUB_STEP_SUMMARY=/workspace/.gts-summary \
            --entrypoint /entrypoint-action.sh \
            git-that-semver-test

          echo "--- Validating YAML output ---"
          sed -n '/^GTS_YAML<<EOF$/,/^EOF$/p' .gts-output | sed '1d;$d' | python3 -c "import sys, yaml; yaml.safe_load(sys.stdin)"
          echo "YAML output OK"

          rm -f .gts-output .gts-summary

  docker-build:
    runs-on: ubuntu-latest
    needs: [git-that-semver, test, test-action]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: prepare-tags
        name: Prepare tags for Docker metadata
        run: |
          {
            echo 'tags<<EOF'
            for tag in ${{ needs.git-that-semver.outputs.GTS_DOCKER_TAGS }}; do
              echo "type=raw,value=$tag"
            done
            echo EOF
          } | tee -a $GITHUB_OUTPUT

      - id: meta
        name: Extract Docker metadata
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: ${{ steps.prepare-tags.outputs.tags }}
          labels: |
            org.opencontainers.image.version=${{ needs.git-that-semver.outputs.GTS_DOCKER_VERSION }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
