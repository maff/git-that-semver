name: Cleanup old Docker snapshot images

on:
  schedule:
    # Run weekly on Sunday at 03:00 UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:
    inputs:
      keep-n-tagged:
        description: "Number of snapshot versions to keep (0 = delete all snapshots)"
        type: number
        default: 20
      dry-run:
        description: "Dry run (log what would be deleted without deleting)"
        type: boolean
        default: false

permissions:
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Delete old snapshot images
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          package: git-that-semver
          # Match snapshot tags: X.Y.Z-TIMESTAMP.SHA (timestamp starts with digit)
          delete-tags: ".*-\\d{14}\\.[0-9a-f]+"
          use-regex: true
          keep-n-tagged: ${{ inputs.keep-n-tagged || 20 }}
          dry-run: ${{ inputs.dry-run || false }}
          token: ${{ github.token }}
